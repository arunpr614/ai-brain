# Volatile raw-backup staging. /run is tmpfs on the production host; runtime
# checks still prove the filesystem, ownership, mode, and capacity before use.
d /run/brain-backup-staging 0700 brain brain-data - -
d /run/brain-recall-backup-staging 0700 brain-recall brain-data - -
d /run/brain-root-backup-staging 0700 root root - -
# Release/restore maintenance lock must survive the /run reboot boundary as a
# freshly provisioned canonical root-only file.
f /run/brain-release.lock 0600 root root - -
