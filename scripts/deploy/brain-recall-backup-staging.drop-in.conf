# Durable privacy overlay retained across application rollback.
[Service]
Environment=BRAIN_RECALL_BACKUP_STAGING_DIR=/run/brain-recall-backup-staging
Environment=BRAIN_SCRUB_RUNTIME_ROOT=/opt/brain/current
RuntimeDirectory=brain-recall-backup-staging
RuntimeDirectoryMode=0700
RuntimeDirectoryPreserve=yes
ReadWritePaths=/run/brain-recall-backup-staging
